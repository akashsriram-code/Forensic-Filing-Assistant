name: Email Alerts

on:
  schedule:
    - cron: '2/5 * * * *'
  workflow_dispatch:

concurrency:
  group: email-alerts
  cancel-in-progress: false

jobs:
  run-email-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore alert state
        uses: actions/cache/restore@v4
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 1
        with:
          path: .github/email-alert-state
          key: email-alert-state-${{ github.run_id }}
          restore-keys: |
            email-alert-state-

      - name: Run email alert job
        env:
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          EMAIL_ALERT_TARGET_TICKER: SBUX
          EMAIL_ALERT_TARGET_TYPE: 8-K
          EMAIL_ALERT_LOOKBACK_DAYS: 2
          ALERT_STATE_PATH: .github/email-alert-state/state.json
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: npx tsx scripts/run-email-alert-job.ts

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .github/email-alert-state
          key: email-alert-state-${{ github.run_id }}
